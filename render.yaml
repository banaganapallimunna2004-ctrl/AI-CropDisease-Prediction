services:
  # 1. Express Backend Web Service
  - type: web
    name: agro-ai-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # User will be prompted to enter their MongoDB Atlas URI during setup
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT key automatically
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        value: http://agro-ai-vision:6000 # Internal Render host resolution
      - key: ALLOWED_ORIGINS
        value: "*" # Update this with your frontend URL once frontend is deployed

  # 2. Flask AI Service (Private Service - internal access only)
  - type: pservice
    name: agro-ai-vision
    env: docker
    dockerContext: ai
    dockerfilePath: ai/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 6000
