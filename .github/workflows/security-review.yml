name: Security Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          npm install exceljs

      - name: Run Backend Security Scan
        working-directory: ./backend
        env:
          NODE_PATH: ./node_modules
        run: |
          node scripts/generateSecuritySuite.js

      - name: Enforce Zero-Critical Policy
        run: |
          # Read the generated executive summary and count critical vulnerabilities
          CRITICAL_COUNT=$(grep -i "Critical Findings:" Test_Results/Security/executive-summary.md | grep -o "[0-9]\+")
          echo "Critical Findings Count: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Zero-Critical Security Gate Failed! Found $CRITICAL_COUNT Critical findings."
            exit 1
          else
            echo "✅ Zero-Critical Security Gate Passed!"
          fi

      - name: Publish Security Review Summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const summaryPath = path.resolve('Test_Results/Security', 'executive-summary.md');
            if (fs.existsSync(summaryPath)) {
              const summaryContent = fs.readFileSync(summaryPath, 'utf8');
              core.summary.addRaw(summaryContent).write();
            } else {
              core.summary.addRaw('### ⚠️ Security Executive Summary report not found.').write();
            }
