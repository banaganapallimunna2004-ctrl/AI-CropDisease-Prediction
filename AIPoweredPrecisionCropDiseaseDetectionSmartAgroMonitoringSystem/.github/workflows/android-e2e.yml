name: Mobile Appium E2E (1,111 Tests)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ORG_GRADLE_PROJECT_android_test_orchestrator: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'AgroAI-Precision-Crop-DetectionAppium/package.json'

      - name: Install Appium & Dependencies
        working-directory: AgroAI-Precision-Crop-DetectionAppium
        run: |
          npm install
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Appium Tests in Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          profile: Nexus 6
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          working-directory: AgroAI-Precision-Crop-DetectionAppium
          script: bash scripts/ci_run_tests.sh
        env:
          APK_PATH: ../app/build/outputs/apk/debug/app-debug.apk
          WDIO_CI_SPEC: ./tests/12_e2e/mega_android_1100.test.js

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            AgroAI-Precision-Crop-DetectionAppium/execution-report.xlsx
            AgroAI-Precision-Crop-DetectionAppium/execution-report.html

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: AgroAI-Precision-Crop-DetectionAppium
          target-folder: reports/latest
          branch: gh-pages
          clean: false

      - name: Archive History Report
        if: always() && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: AgroAI-Precision-Crop-DetectionAppium
          target-folder: reports/history/build-${{ github.run_number }}
          branch: gh-pages
          clean: false
